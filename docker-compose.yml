services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: roster-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - roster-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: roster-server
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    volumes:
      - ./server:/app
    networks:
      - roster-network

networks:
  roster-network:
    driver: bridge
